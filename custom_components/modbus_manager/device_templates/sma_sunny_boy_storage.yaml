# SMA Sunny Boy Storage template for Modbus Manager
#
# Initial read-only template for:
# - SBS2.5-1VL-10
# - SBS3.7-10
# - SBS5.0-10
# - SBS6.0-10
#
# WARNING:
# Register values must be validated against the SMA Modbus profile
# installed on the actual device.
# No writable entities are included.

name: "SMA Sunny Boy Storage"
display_name: "SMA Sunny Boy Storage"
description: >-
  Read-only Modbus TCP template for SMA Sunny Boy Storage battery
  inverters. Initial support includes battery state of charge,
  battery inverter power and lifetime energy.

manufacturer: "SMA"
model: "Sunny Boy Storage"
version: 0.2.0
default_prefix: "SMA_SBS"
default_slave_id: 3
type: "Battery_Inverter"
firmware_version: "0.1.0"

dynamic_config:
  valid_models:
    "SBS2.5-1VL-10":
      phases: 1
      battery_enabled: true
      max_ac_output_power: 2500

    "SBS3.7-10":
      phases: 1
      battery_enabled: true
      max_ac_output_power: 3700

    "SBS5.0-10":
      phases: 1
      battery_enabled: true
      max_ac_output_power: 5000

    "SBS6.0-10":
      phases: 1
      battery_enabled: true
      max_ac_output_power: 6000

  firmware_version:
    description: "SMA Modbus register profile"
    options:
      "0.1.0": "Initial read-only SBS profile"
    default: "0.1.0"

sensors:
  - name: "Battery State of Charge"
    unique_id: "battery_state_of_charge"
    address: 30845
    input_type: "input"
    data_type: "uint32"
    count: 2
    scale: 1
    unit_of_measurement: "%"
    device_class: "battery"
    state_class: "measurement"
    precision: 0
    byte_order: "big"

  - name: "Battery Power"
    unique_id: "battery_power"
    address: 30775
    input_type: "input"
    data_type: "int32"
    count: 2
    scale: 1
    unit_of_measurement: "W"
    device_class: "power"
    state_class: "measurement"
    byte_order: "big"

  - name: "Battery Energy Discharged Total"
    unique_id: "battery_energy_discharged_total"
    address: 30529
    input_type: "input"
    data_type: "uint32"
    count: 2
    scale: 0.001
    unit_of_measurement: "kWh"
    device_class: "energy"
    state_class: "total_increasing"
    precision: 2
    byte_order: "big"

calculated:
  - name: "Battery Active"
    unique_id: "battery_active"
    type: "binary_sensor"
    state: >-
      {{ states('sensor.{PREFIX}_battery_power') | float(0) != 0 }}
    availability: >-
      {{ states('sensor.{PREFIX}_battery_power')
         not in ['unknown', 'unavailable', 'none', ''] }}
    icon: "mdi:battery-sync"

  - name: "Battery Charging"
    unique_id: "battery_charging"
    type: "binary_sensor"
    state: >-
      {{ states('sensor.{PREFIX}_battery_power') | float(0) < 0 }}
    availability: >-
      {{ states('sensor.{PREFIX}_battery_power')
         not in ['unknown', 'unavailable', 'none', ''] }}
    icon: "mdi:battery-arrow-up"

  - name: "Battery Discharging"
    unique_id: "battery_discharging"
    type: "binary_sensor"
    state: >-
      {{ states('sensor.{PREFIX}_battery_power') | float(0) > 0 }}
    availability: >-
      {{ states('sensor.{PREFIX}_battery_power')
         not in ['unknown', 'unavailable', 'none', ''] }}
    icon: "mdi:battery-arrow-down"
